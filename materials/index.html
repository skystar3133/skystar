<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>수업자료 – 하늘별컴퓨터교습소</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F9FD;
      color: #2D3748;
      line-height: 1.6;
    }

    .header {
      background: #0D1B2A;
      color: #fff;
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header a { color: rgba(255,255,255,.7); text-decoration: none; font-size: 0.9rem; }
    .header a:hover { color: #fff; }
    .header h1 { font-size: 1.1rem; font-weight: 800; }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px 80px; }

    /* 비밀번호 게이트 */
    #gate {
      max-width: 360px;
      margin: 80px auto 0;
      text-align: center;
    }
    #gate p { color: #64748B; margin-bottom: 20px; }
    #gate input {
      width: 100%;
      padding: 14px;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    #gate button {
      width: 100%;
      padding: 14px;
      background: #034AA6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    #gate button:hover { background: #023a85; }
    #gateError { color: #E53E3E; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
    #gateStatus { color: #64748B; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
  </style>
</head>
<body>

<header class="header">
  <h1>📁 수업자료</h1>
  <a href="../index.html">← 홈으로</a>
</header>

<div class="container">

  <!-- 비밀번호 게이트 -->
  <div id="gate">
    <p>비밀번호를 입력해주세요</p>
    <form id="gateForm">
      <input type="password" id="passwordInput" inputmode="numeric" placeholder="••••" autofocus>
      <button type="submit">입장</button>
    </form>
    <div id="gateError"></div>
    <div id="gateStatus"></div>
  </div>

</div>

<script>
  const API_BASE = 'https://skystar-backend.vercel.app';

  const gateError = document.getElementById('gateError');
  const gateStatus = document.getElementById('gateStatus');

  async function tryEnter(password) {
    gateError.textContent = '';
    gateStatus.textContent = '';
    try {
      const res = await fetch(`${API_BASE}/api/materials/drive-folder`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (!res.ok) {
        gateError.textContent = '비밀번호가 올바르지 않습니다.';
        return;
      }
      const data = await res.json();
      gateStatus.textContent = '구글 드라이브로 이동합니다... (본인 계정으로 로그인해주세요)';
      window.location.href = data.driveUrl;
    } catch (error) {
      gateError.textContent = '확인 중 오류가 발생했습니다: ' + error.message;
    }
  }

  document.getElementById('gateForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const password = document.getElementById('passwordInput').value.trim();
    if (password) tryEnter(password);
  });
</script>

</body>
</html>
