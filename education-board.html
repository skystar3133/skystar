<html lang="ko">
<head>

  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />

    :root {
      --primary: #3A7BD5;
      --primary-dark: #1E57B8;
      --dark: #1B2A4A;
      --text: #2D3748;
      --muted: #64748B;
      --white: #FFFFFF;
      --bg-light: #F7F9FD;
      --border: #E2E8F0;
      --green: #28a745;
      --blue: #0070CC;
      --shadow-sm: 0 2px 12px rgba(58,123,213,.08);
      --shadow-md: 0 8px 32px rgba(58,123,213,.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* 헤더 */
    .header {
      background: #0D1B2A;
      color: var(--white);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .header-nav a {
      color: rgba(255,255,255,.7);
      text-decoration: none;
      margin-left: 24px;
      transition: color .2s;
    }

    .header-nav a:hover {
      color: var(--white);
    }

    /* 메인 섹션 */
    .section {
      padding: 80px 28px;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #034AA6;
      margin-bottom: 16px;
      text-align: center;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 필터 */
    .filter-container {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      background: var(--bg-light);
      border: 2px solid var(--border);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      transition: all .2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #034AA6;
      color: var(--white);
      border-color: #034AA6;
    }

    /* 게시판 */
    .board-container {
      background: var(--white);
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .post-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all .3s;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .post-card:hover {
      border-color: #034AA6;
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .post-badge {
      display: inline-block;
      background: rgba(3, 74, 166, 0.1);
      color: #034AA6;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .post-date {
      display: inline-block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: 8px;
    }

    .post-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin: 12px 0;
      line-height: 1.4;
    }

    .post-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
    }

    .read-more {
      color: #034AA6;
      font-weight: 600;
      text-decoration: none;
      transition: color .2s;
    }

    .read-more:hover {
      color: #025199;
    }

    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--white);
      border-radius: 12px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .modal-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--dark);
      max-width: 85%;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s;
    }

    .modal-close:hover {
      color: var(--dark);
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      font-size: 0.95rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .modal-body {
      color: var(--text);
      line-height: 1.8;
      font-size: 1rem;
    }

    .modal-body h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
      margin: 24px 0 12px;
    }

    .modal-body ul {
      margin-left: 20px;
      margin-bottom: 16px;
    }

    .modal-body li {
      margin-bottom: 8px;
    }

    .modal-body p {
      margin-bottom: 12px;
    }

    /* 푸터 */
    .footer {
      background: #0D1B2A;
      color: var(--white);
      padding: 44px 28px;
      text-align: center;
    }

    .footer-text {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .section {
        padding: 60px 20px;
      }

      .section-title {
        font-size: 1.8rem;
      }

      .header-nav {
        display: none;
      }

      .post-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        padding: 24px;
      }

      .modal-title {
        font-size: 1.3rem;
      }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
  </style>
</head>

  let filteredPosts = posts;

  function renderPosts(postsToRender) {
    const grid = document.getElementById('postGrid');

    if (postsToRender.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">해당하는 게시물이 없습니다.</div>';
      return;
    }

    grid.innerHTML = postsToRender.map(post => `
      <div class="post-card" onclick="openModal(${post.id}); return false;">
        <span class="post-badge">${post.categoryLabel}</span>
        <span class="post-date">${post.date}</span>
        <h3 class="post-title">${post.title}</h3>
        <p class="post-desc">${post.desc}</p>
        <div class="post-footer">
          <span>📌 ${post.source}</span>
          <span class="read-more" style="cursor: pointer; user-select: none;">읽기 →</span>
        </div>
      </div>
    `).join('');
  }

  function filterPosts(category) {
    // 버튼 활성화 표시
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // 게시물 필터링
    if (category === 'all') {
      filteredPosts = posts;
    } else {
      filteredPosts = posts.filter(post => post.category === category);
    }

    renderPosts(filteredPosts);
  }

  function openModal(postId) {
    const post = posts.find(p => p.id === postId);
    if (!post) {
      console.error('Post not found:', postId);
      return;
    }

    const badge = document.getElementById('modalBadge');
    badge.textContent = post.categoryLabel;
    badge.className = 'post-badge';

    document.getElementById('modalTitle').textContent = post.title;
    document.getElementById('modalDate').innerHTML = `📅 <strong>${post.date}</strong>`;
    document.getElementById('modalSource').innerHTML = `📌 <strong>${post.source}</strong>`;
    document.getElementById('modalBody').innerHTML = post.content;

    const modal = document.getElementById('postModal');
    modal.classList.add('active');
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    console.log('Modal opened for post:', post.title);
  }

  function closeModal() {
    const modal = document.getElementById('postModal');
    modal.classList.remove('active');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
    console.log('Modal closed');
  }

  // 초기 렌더링
  function init() {
    renderPosts(posts);

    // 모달 외부 클릭 시 닫기
    const modal = document.getElementById('postModal');
    modal.addEventListener('click', (e) => {
      if (e.target.id === 'postModal') {
        closeModal();
      }
    });

    // 필터 버튼 초기 활성화
    const allBtn = document.querySelector('.filter-btn');
    if (allBtn) {
      allBtn.classList.add('active');
    }

    console.log('Education board initialized with', posts.length, 'posts');
  }

  // 페이지 로드 시 초기화
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
