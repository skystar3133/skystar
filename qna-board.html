<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="하늘별컴퓨터교습소 – Q&A 게시판" />
  <title>Q&A 게시판 – 하늘별컴퓨터교습소</title>

  <!-- Pretendard 폰트 -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />

  <style>
    :root {
      --primary: #3A7BD5;
      --dark: #1B2A4A;
      --text: #2D3748;
      --muted: #64748B;
      --white: #FFFFFF;
      --bg-light: #F7F9FD;
      --border: #E2E8F0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* 헤더 */
    .header {
      background: #0D1B2A;
      color: var(--white);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .header-nav a {
      color: rgba(255,255,255,.7);
      text-decoration: none;
      margin-left: 24px;
      transition: color .2s;
    }

    .header-nav a:hover {
      color: var(--white);
    }

    /* 섹션 */
    .section {
      padding: 80px 28px;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #034AA6;
      margin-bottom: 16px;
      text-align: center;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 컨트롤 바 */
    .qna-controls {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }

    .search-input:focus {
      outline: none;
      border-color: #034AA6;
      box-shadow: 0 0 0 3px rgba(3, 74, 166, 0.1);
    }

    .filter-select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: white;
      cursor: pointer;
    }

    .btn {
      background: #034AA6;
      color: var(--white);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all .2s;
      font-family: inherit;
    }

    .btn:hover {
      background: #025199;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(3, 74, 166, 0.3);
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #CBD5E1;
    }

    /* Q&A 리스트 */
    .qna-list {
      display: grid;
      gap: 16px;
    }

    .qna-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all .3s;
      cursor: pointer;
    }

    .qna-item:hover {
      border-color: #034AA6;
      box-shadow: 0 8px 32px rgba(58,123,213,.14);
      transform: translateY(-4px);
    }

    .qna-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .qna-status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-solved {
      background: rgba(40, 167, 69, 0.1);
      color: #1e7e34;
    }

    .status-unsolved {
      background: rgba(255, 193, 7, 0.1);
      color: #f57f17;
    }

    .category-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .cat-python { background: rgba(33, 150, 243, 0.1); color: #1565c0; }
    .cat-cert { background: rgba(76, 175, 80, 0.1); color: #2e7d32; }
    .cat-sw { background: rgba(156, 39, 176, 0.1); color: #6a1b9a; }

    .qna-meta {
      display: flex;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .qna-author {
      font-weight: 600;
    }

    .qna-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin: 12px 0;
      line-height: 1.4;
    }

    .qna-content {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .qna-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .qna-stats {
      display: flex;
      gap: 16px;
    }

    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--white);
      border-radius: 12px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--muted);
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .modal-body {
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .answers-section {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 2px solid var(--border);
    }

    .answers-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--dark);
    }

    .answer-item {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .answer-header {
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .answer-content {
      color: var(--text);
      line-height: 1.6;
    }

    .answer-form {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .answer-form-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--dark);
    }

    /* 폼 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--dark);
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: #034AA6;
      box-shadow: 0 0 0 3px rgba(3, 74, 166, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      background: var(--white);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .empty-answers {
      color: var(--muted);
      font-style: italic;
    }

    /* 푸터 */
    .footer {
      background: #0D1B2A;
      color: var(--white);
      padding: 44px 28px;
      text-align: center;
    }

    .footer-text {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .section {
        padding: 60px 20px;
      }

      .qna-controls {
        flex-direction: column;
      }

      .search-box {
        width: 100%;
      }

      .modal-content {
        padding: 24px;
      }

      .modal-title {
        font-size: 1.2rem;
      }

      .modal-footer {
        flex-direction: column;
      }

      .modal-footer .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-inner container">
    <div class="header-title">❓ Q&A 게시판</div>
    <nav class="header-nav">
      <a href="index.html">← 홈으로</a>
    </nav>
  </div>
</header>

<!-- 메인 섹션 -->
<section class="section">
  <div class="container">
    <h1 class="section-title">Q&A 게시판</h1>
    <p class="section-desc">파이썬, 자격증, SW 학습에 관한 질문과 답변을 나누는 공간입니다. 궁금한 점을 남겨주세요!</p>

    <!-- 컨트롤 바 -->
    <div class="qna-controls">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="질문 검색...">
      </div>

      <select class="filter-select" id="filterCategory">
        <option value="all">전체 카테고리</option>
        <option value="python">파이썬 문법</option>
        <option value="cert">자격증 취득</option>
        <option value="sw">SW 학습</option>
      </select>

      <button class="btn" onclick="openWriteModal()">📝 문의하기</button>
    </div>

    <!-- Q&A 리스트 -->
    <div class="qna-list" id="qnaList"></div>
  </div>
</section>

<!-- 상세보기 모달 -->
<div class="modal" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <div>
        <span class="category-badge" id="modalCategory"></span>
        <span class="status-badge" id="modalStatus"></span>
      </div>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta">
      <span id="modalAuthor"></span>
      <span id="modalDate"></span>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="answers-section">
      <h3 class="answers-title">💬 답변 (<span id="answerCount">0</span>)</h3>
      <div id="answersList"></div>

      <!-- 답변 작성 폼 -->
      <div class="answer-form">
        <div class="answer-form-title">답변 작성</div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" class="form-input" id="answerAuthor" placeholder="성명을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">답변</label>
          <textarea class="form-textarea" id="answerContent" placeholder="도움이 될 답변을 작성해주세요" style="min-height: 80px;"></textarea>
        </div>
        <button class="btn btn-small" onclick="submitAnswer()">💾 답변 저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal" id="writeModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">질문 작성</h2>
      <button class="modal-close" onclick="closeWriteModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input type="text" class="form-input" id="authorInput" placeholder="성명을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select class="form-select" id="categoryInput">
          <option value="python">파이썬 문법</option>
          <option value="cert">자격증 취득</option>
          <option value="sw">SW 학습</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">제목</label>
        <input type="text" class="form-input" id="titleInput" placeholder="질문 제목을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">내용</label>
        <textarea class="form-textarea" id="contentInput" placeholder="자세한 질문 내용을 입력하세요"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeWriteModal()">취소</button>
      <button class="btn" onclick="submitQuestion()">질문 작성</button>
    </div>
  </div>
</div>

<!-- 푸터 -->
<footer class="footer">
  <p class="footer-text">© 2026 하늘별컴퓨터교습소. All rights reserved.</p>
</footer>

  function loadQnaData() {
    const saved = localStorage.getItem('qnaData');
    if (saved) {
      return JSON.parse(saved);
    }
    return [...defaultQnaData];
  }

  function saveQnaData(data) {
    localStorage.setItem('qnaData', JSON.stringify(data));
  }

  let qnaData = loadQnaData();
  let filteredQna = [...qnaData];

  function getCategoryLabel(cat) {
    const labels = { python: '파이썬 문법', cert: '자격증 취득', sw: 'SW 학습' };
    return labels[cat] || cat;
  }

  function getCategoryClass(cat) {
    const classes = { python: 'cat-python', cert: 'cat-cert', sw: 'cat-sw' };
    return classes[cat] || 'cat-python';
  }

  function renderQnaList() {
    const list = document.getElementById('qnaList');
    if (filteredQna.length === 0) {
      list.innerHTML = '<div class="empty-state">해당하는 질문이 없습니다.</div>';
      return;
    }
    list.innerHTML = filteredQna.map(qna => `
      <div class="qna-item" onclick="openDetailModal(${qna.id})">
        <div class="qna-header">
          <div class="qna-status">
            <span class="status-badge ${qna.solved ? 'status-solved' : 'status-unsolved'}">
              ${qna.solved ? '✓ 해결됨' : '? 미해결'}
            </span>
            <span class="category-badge ${getCategoryClass(qna.category)}">
              ${getCategoryLabel(qna.category)}
            </span>
          </div>
          <div class="qna-meta">
            <span class="qna-author">${qna.author}</span>
            <span>${qna.date}</span>
          </div>
        </div>
        <h3 class="qna-title">${qna.title}</h3>
        <p class="qna-content">${qna.content}</p>
        <div class="qna-footer">
          <div class="qna-stats">
            <span>👁️ ${qna.views}</span>
            <span>💬 ${qna.answers.length}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openDetailModal(id) {
    currentQnaId = id;
    const qna = qnaData.find(q => q.id === id);
    if (!qna) return;

    document.getElementById('modalCategory').className = `category-badge ${getCategoryClass(qna.category)}`;
    document.getElementById('modalCategory').textContent = getCategoryLabel(qna.category);
    document.getElementById('modalStatus').className = `status-badge ${qna.solved ? 'status-solved' : 'status-unsolved'}`;
    document.getElementById('modalStatus').textContent = qna.solved ? '✓ 해결됨' : '? 미해결';
    document.getElementById('modalTitle').textContent = qna.title;
    document.getElementById('modalAuthor').textContent = `글쓴이: ${qna.author}`;
    document.getElementById('modalDate').textContent = qna.date;
    document.getElementById('modalBody').textContent = qna.content;
    document.getElementById('answerCount').textContent = qna.answers.length;

    document.getElementById('answersList').innerHTML = qna.answers.length > 0
      ? qna.answers.map(ans => `
        <div class="answer-item">
          <div class="answer-header">${ans.author}</div>
          <div class="answer-content">${ans.content}</div>
        </div>
      `).join('')
      : '<p class="empty-answers">아직 답변이 없습니다. 첫 번째 답변을 남겨주세요!</p>';

    document.getElementById('answerAuthor').value = '';
    document.getElementById('answerContent').value = '';

    document.getElementById('detailModal').classList.add('active');
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('active');
    currentQnaId = null;
  }

  function submitAnswer() {
    if (!currentQnaId) return;

    const author = document.getElementById('answerAuthor').value.trim();
    const content = document.getElementById('answerContent').value.trim();

    if (!author || !content) {
      alert('이름과 답변을 입력해주세요.');
      return;
    }

    const qna = qnaData.find(q => q.id === currentQnaId);
    if (qna) {
      qna.answers.push({ author, content });
      if (qna.answers.length > 0) {
        qna.solved = true;
      }
      saveQnaData(qnaData);
      alert('답변이 등록되었습니다!');
      closeDetailModal();
      filterQna();
    }
  }

  function openWriteModal() {
    document.getElementById('writeModal').classList.add('active');
  }

  function closeWriteModal() {
    document.getElementById('writeModal').classList.remove('active');
    document.getElementById('authorInput').value = '';
    document.getElementById('titleInput').value = '';
    document.getElementById('contentInput').value = '';
  }

  function submitQuestion() {
    const author = document.getElementById('authorInput').value.trim();
    const title = document.getElementById('titleInput').value.trim();
    const content = document.getElementById('contentInput').value.trim();
    const category = document.getElementById('categoryInput').value;

    if (!author || !title || !content) {
      alert('모든 필드를 입력해주세요.');
      return;
    }

    const newQuestion = {
      id: Math.max(...qnaData.map(q => q.id)) + 1,
      title,
      author,
      category,
      date: new Date().toISOString().split('T')[0],
      solved: false,
      views: 0,
      answers: [],
      content
    };

    qnaData.unshift(newQuestion);
    saveQnaData(qnaData);
    filteredQna = [...qnaData];
    renderQnaList();
    closeWriteModal();
    alert('질문이 작성되었습니다!');
  }

  function filterQna() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('filterCategory').value;

    filteredQna = qnaData.filter(qna => {
      const matchSearch = qna.title.toLowerCase().includes(searchTerm) || qna.content.toLowerCase().includes(searchTerm);
      const matchCategory = category === 'all' || qna.category === category;
      return matchSearch && matchCategory;
    });

    renderQnaList();
  }

  document.getElementById('searchInput').addEventListener('input', filterQna);
  document.getElementById('filterCategory').addEventListener('change', filterQna);
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if (e.target.id === 'detailModal') closeDetailModal();
  });
  document.getElementById('writeModal').addEventListener('click', (e) => {
    if (e.target.id === 'writeModal') closeWriteModal();
  });

  renderQnaList();
</script>
