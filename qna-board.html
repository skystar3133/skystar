  <!-- Pretendard 폰트 -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />

    :root {
      --primary: #3A7BD5;
      --primary-dark: #1E57B8;
      --dark: #1B2A4A;
      --text: #2D3748;
      --muted: #64748B;
      --white: #FFFFFF;
      --bg-light: #F7F9FD;
      --border: #E2E8F0;
      --green: #28a745;
      --red: #dc3545;
      --shadow-sm: 0 2px 12px rgba(58,123,213,.08);
      --shadow-md: 0 8px 32px rgba(58,123,213,.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* 헤더 */
    .header {
      background: #0D1B2A;
      color: var(--white);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .header-nav a {
      color: rgba(255,255,255,.7);
      text-decoration: none;
      margin-left: 24px;
      transition: color .2s;
    }

    .header-nav a:hover {
      color: var(--white);
    }

    /* 메인 섹션 */
    .section {
      padding: 80px 28px;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #034AA6;
      margin-bottom: 16px;
      text-align: center;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 컨트롤 바 */
    .qna-controls {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }

    .search-input:focus {
      outline: none;
      border-color: #034AA6;
      box-shadow: 0 0 0 3px rgba(3, 74, 166, 0.1);
    }

    .filter-group {
      display: flex;
      gap: 12px;
    }

    .filter-select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: white;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: #034AA6;
    }

    .btn {
      background: #034AA6;
      color: var(--white);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all .2s;
      font-family: inherit;
    }

    .btn:hover {
      background: #025199;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(3, 74, 166, 0.3);
    }

    /* Q&A 리스트 */
    .qna-list {
      display: grid;
      gap: 16px;
    }

    .qna-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all .3s;
      cursor: pointer;
    }

    .qna-item:hover {
      border-color: #034AA6;
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
    }

    .qna-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .qna-status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-solved {
      background: rgba(40, 167, 69, 0.1);
      color: #1e7e34;
    }

    .status-unsolved {
      background: rgba(255, 193, 7, 0.1);
      color: #f57f17;
    }

    .category-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .cat-basic { background: rgba(33, 150, 243, 0.1); color: #1565c0; }
    .cat-web { background: rgba(76, 175, 80, 0.1); color: #2e7d32; }
    .cat-data { background: rgba(156, 39, 176, 0.1); color: #6a1b9a; }
    .cat-ai { background: rgba(255, 152, 0, 0.1); color: #e65100; }
    .cat-security { background: rgba(233, 30, 99, 0.1); color: #c2185b; }

    .qna-meta {
      display: flex;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .qna-author {
      font-weight: 600;
    }

    .qna-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin: 12px 0;
      line-height: 1.4;
    }

    .qna-content {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .qna-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
    }

    .qna-stats {
      display: flex;
      gap: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--white);
      border-radius: 12px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      max-width: 85%;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--muted);
    }

    .modal-close:hover {
      color: var(--dark);
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .modal-body {
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .answers-section {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 2px solid var(--border);
    }

    .answer-item {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .answer-header {
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .answer-content {
      color: var(--text);
      line-height: 1.6;
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 0.9rem;
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-small:hover {
      background: var(--border);
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      background: var(--white);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    /* 푸터 */
    .footer {
      background: #0D1B2A;
      color: var(--white);
      padding: 44px 28px;
      text-align: center;
    }

    .footer-text {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .section {
        padding: 60px 20px;
      }

      .qna-controls {
        flex-direction: column;
      }

      .search-box {
        width: 100%;
      }

      .filter-group {
        width: 100%;
      }

      .filter-select {
        flex: 1;
      }

      .qna-header {
        flex-direction: column;
      }

      .qna-footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .modal-content {
        padding: 24px;
      }

      .modal-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

  </div>
</div>

  let currentQna = null;
  let filteredQna = [...qnaData];

  function getCategoryLabel(cat) {
    const labels = {
      basic: '프로그래밍 기초',
      web: '웹 개발',
      data: '데이터 과학',
      ai: '인공지능',
      security: '정보보안'
    };
    return labels[cat] || cat;
  }

  function getCategoryClass(cat) {
    const classes = {
      basic: 'cat-basic',
      web: 'cat-web',
      data: 'cat-data',
      ai: 'cat-ai',
      security: 'cat-security'
    };
    return classes[cat] || 'cat-basic';
  }

  function renderQnaList() {
    const list = document.getElementById('qnaList');

    if (filteredQna.length === 0) {
      list.innerHTML = '<div class="empty-state">해당하는 질문이 없습니다.</div>';
      return;
    }

    list.innerHTML = filteredQna.map(qna => `
      <div class="qna-item" onclick="openDetail(${qna.id})">
        <div class="qna-header">
          <div class="qna-status">
            <span class="status-badge ${qna.solved ? 'status-solved' : 'status-unsolved'}">
              ${qna.solved ? '✓ 해결됨' : '? 미해결'}
            </span>
            <span class="category-badge ${getCategoryClass(qna.category)}">
              ${getCategoryLabel(qna.category)}
            </span>
          </div>
          <div class="qna-meta">
            <span class="qna-author">${qna.author}</span>
            <span>${qna.date}</span>
          </div>
        </div>
        <h3 class="qna-title">${qna.title}</h3>
        <p class="qna-content">${qna.content}</p>
        <div class="qna-footer">
          <div class="qna-stats">
            <span class="stat">👁️ ${qna.views}</span>
            <span class="stat">💬 ${qna.answers}</span>
          </div>
          <button class="btn-small">보기</button>
        </div>
      </div>
    `).join('');
  }

  function openDetail(id) {
    currentQna = qnaData.find(q => q.id === id);
    if (!currentQna) return;

    document.getElementById('modalCategory').className = `category-badge ${getCategoryClass(currentQna.category)}`;
    document.getElementById('modalCategory').textContent = getCategoryLabel(currentQna.category);

    document.getElementById('modalStatus').className = `status-badge ${currentQna.solved ? 'status-solved' : 'status-unsolved'}`;
    document.getElementById('modalStatus').textContent = currentQna.solved ? '✓ 해결됨' : '? 미해결';

    document.getElementById('modalTitle').textContent = currentQna.title;
    document.getElementById('modalAuthor').textContent = `${currentQna.author}`;
    document.getElementById('modalDate').textContent = currentQna.date;
    document.getElementById('modalBody').textContent = currentQna.content;

    const answersList = document.getElementById('answersList');
    answersList.innerHTML = currentQna.answersDetail.map(ans => `
      <div class="answer-item">
        <div class="answer-header">${ans.author}</div>
        <div class="answer-content">${ans.content}</div>
      </div>
    `).join('');

    document.getElementById('detailModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
  }

  function filterQna() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('filterCategory').value;
    const solved = document.getElementById('filterSolved').value;

    filteredQna = qnaData.filter(qna => {
      const matchSearch = qna.title.toLowerCase().includes(searchTerm) ||
                         qna.content.toLowerCase().includes(searchTerm);
      const matchCategory = category === 'all' || qna.category === category;
      const matchSolved = solved === 'all' || (solved === 'solved' ? qna.solved : !qna.solved);

      return matchSearch && matchCategory && matchSolved;
    });

    renderQnaList();
  }

  // 이벤트 리스너
  document.getElementById('searchInput').addEventListener('input', filterQna);
  document.getElementById('filterCategory').addEventListener('change', filterQna);
  document.getElementById('filterSolved').addEventListener('change', filterQna);
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if (e.target.id === 'detailModal') closeModal();
  });

  // 초기 로드
  renderQnaList();
</script>
